version: "3.9"

services:

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB:       ecocred_db
      POSTGRES_USER:     ecocred_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecocred_user -d ecocred_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  django:
    build:
      context: ./ecocred-backend
      dockerfile: Dockerfile
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata initial_data &&
             gunicorn ecocred.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --timeout 120"
    env_file: .env.production
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - ML_SERVICE_URL=http://ml:8001
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    expose:
      - "8000"

  celery:
    build:
      context: ./ecocred-backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A ecocred worker --loglevel=info --concurrency=4
    env_file: .env.production
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - ML_SERVICE_URL=http://ml:8001
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  ml:
    build:
      context: ./ecocred-backend/ml_service
      dockerfile: Dockerfile.ml
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 2
    volumes:
      - ./ecocred-backend/ml_service/ecocred_model.pth:/app/ecocred_model.pth
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - django

volumes:
  postgres_data:
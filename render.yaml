services:
  - type: web
    name: ecocred-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn backend.ecocred.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: ecocred-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ecocred-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecocred-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: ecocred-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecocred-db
          property: port
      - key: REDIS_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FCM_SERVER_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false

  - type: web
    name: ecocred-ml-service
    runtime: python
    plan: free
    rootDir: backend/mlservice
    buildCommand: pip install -r mlrequirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

databases:
  - name: ecocred-db
    databaseName: ecocred_db
    user: ecocred_user
    plan: free

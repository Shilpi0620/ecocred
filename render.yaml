services:
  - type: web
    name: ecocred-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://ecocred-backend.onrender.com

  - type: web
    name: ecocred-backend
    runtime: python
    plan: free
    healthCheckPath: /
    buildCommand: pip install -r backend/requirements.txt && python manage.py collectstatic --noinput
    #preDeployCommand: python manage.py migrate
    startCommand: |
     python mange.py migrate
     gunicorn backend.ecocred.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ecocred-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ecocred-frontend.onrender.com"
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: ecocred-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ecocred-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecocred-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: ecocred-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecocred-db
          property: port
      - key: ML_SERVICE_URL
        value: https://ecocred-ml-service.onrender.com

  - type: web
    name: ecocred-ml-service
    runtime: python
    plan: free
    healthCheckPath: /health
    rootDir: backend/mlservice
    buildCommand: pip install -r mlrequirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

databases:
  - name: ecocred-db
    databaseName: ecocred_db
    user: ecocred_user
    plan: free
